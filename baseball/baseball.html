<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>야구 순위</title>
    <link rel="icon" href="ball.png">
    <link rel="stylesheet" href="baseball.css">
</head>
<body>
    <div class="container">
        <div class="title">종합 순위</div>
        <div class="baseballTable">
            <table>
                <thead>
                    <tr>
                        <th class="grade" style="padding: 0px 0px 0px 10px;">순위</th>
                        <th class="name">팀</th>
                        <th class="round">경기</th>
                        <th class="win">승</th>
                        <th class="compare">무</th>
                        <th class="lose">패</th>
                        <th id="winRateId" style="color: rgb(63, 63, 245);">승률</th>
                        <th class="dis">게임차</th>
                        <th class="seqLose">연속</th>
                    </tr>
                </thead>
                <tbody id="tbody">
                    
                </tbody>
            </table>
        </div>
    </div>

    <script src="baseball.js" type="text/javascript"></script>
</body>
</html>
