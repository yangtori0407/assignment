<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Chiron+GoRound+TC:wght@200..900&display=swap" rel="stylesheet">
    <style>
        .chiron-goround{
            font-family: "Chiron GoRound TC", sans-serif;
            font-optical-sizing: auto;
            font-weight: 350;
            font-style: normal;
        }

        body{
            display: flex;
            justify-content: center;
        }



        /* 슬라이스 기본 구성 요소 */
        .slice{
            width: 1280px;
            height : 720px;
            background-color: #fcfcfc;
            position: relative;
            padding: 40px 0px 0px 40px;
            box-sizing: border-box;
            margin-bottom: 10px;
            box-shadow: 0px 0px 3px rgb(194, 194, 194);
        }
        .sliceBorder1{
            width: 1200px;
            height :50px;
            border-top: 3px solid #2869D0;
            border-left: 3px solid #2869D0;
            border-right: 3px solid #2869D0;
            border-radius: 8px;
            
        }
        .sliceBorder2{
            width: 1200px;
            height :50px;
            border-left: 9px solid #2869D0;
            margin-top: -7px;
            margin-left: -3px;
        }
        .sliceBorder3{
            width: 20px;
            height: 20px;
            background-color: #f5f5f7;
            position: absolute;
            left: 1228px;
            top: 87px;
        }
        .sliceBorder4{
            position: absolute;
            width: 20px;
            height: 250px;
            left: 1235px;
            top: 102px;
            color: #c0c0c0;
            writing-mode: vertical-rl;
        }
        .sliceBottom1{
            width: 1198px;
            height :50px;
            border-right: 9px solid #2869D0;
            margin-bottom: -6px;
            
        }
        .sliceBottom2{
            width: 1200px;
            height :50px;
            border-bottom: 3px solid #2869D0;
            border-left: 3px solid #2869D0;
            border-right: 3px solid #2869D0;
            border-radius: 8px;
        }
        .sliceBottom3{
            width: 20px;
            height: 20px;
            background-color: #f5f5f7;;
            position: absolute;
        }
        .sliceBottom4{
            position: absolute;
            width: 20px;
            height: 250px;
            color: #c0c0c0;
            writing-mode: vertical-rl;
            top:410px;
            left: 33px;
        }
        .introducePage{
            width: 1200px;
            height :550px;
            position: relative;
            display: flex;
        }

        /* 첫번째 */
        #introduce{
            height: 400px;
            position: relative;
        }
        #introduce>p{
            font-weight: 600;
            font-size: 100px;
            margin: 0px;
            position: absolute;
            top: 130px;
            left: 420px;
            color: #2869D2;
        }
        #firstPageName{
            position: relative;
            width: 100%;
            height: 30px;
        }
        #firstPageName>p{
            position: absolute;
            color: #2869D0;
            left: 1080px;
            font-size: 23px;
        }
        /*  두번째 */
        #information{
            width: 60%;
            height :100%;
        }
        #name{            
            color: #2869D0;
            position:absolute;
            left: 70px;
            top: -50px;
            font-size: 70px;
            font-weight: bold;
        }
        #tmi{
            width: 100%;
            height: 500px;
            margin-top: 10px;
        }
        #profile_img{
            width: 40%;
            height :100%;
            position: relative;
        }
        #profile_img>img{
            width: 400px;
            height :450px;
            position: absolute;
            top: 30px;
        }
        #tmi{
            position: relative;
        }
        #tmi>table{
            position: absolute;
            left: 70px;
            top:100px;
            border-collapse: collapse;
            font-size: 27px;
            width: 70%;
        }
        .under1{
            border-bottom: 4px solid #2869D0;
            width: 20%;
            
        }
        .under2{
            border-bottom: 1px solid #2869D0;
            color: rgb(90, 90, 90);
        }
        /* 세번째 */
        .title{
            width: 100%;
            position: absolute;
            top: -90px;
            left: 40px;
            font-size: 60px;
            color: #2869D0;
            font-weight: bold;
        }
        #hobbyImg{
            width: 1200px;
            height: 550px;
            display: flex;
            box-sizing: border-box;
        }
        #game{
            width: 38%;
            height: 100%;
        }
        #peak{
            width: 100%;
            height: 55%;
            margin-top: 10px;
        }
        #repo{
            width: 100%;
            height: 40%;
            margin-top: 8px;
        }
        #switch{
            width: 35%;
            height: 100%;
            margin:0px 0px 0px 20px;
        }
        #zelda{
            width: 100%;
            height: 43%;
            background-color: #2869D0;
        }
        #friren{
            width: 100%;
            height: 50%;
            background-color: oldlace;
            margin-top: 30px;
        }
        #drama{
            width: 28%;
            height: 100%;
        }
        #translate{
            width: 90%;
            height: 80%;
            background-color: maroon;
            margin: 38px 0px 0px 30px;
        }
        #hobbyImg img{
            width: 100%;
            height:100%;
            object-fit: cover;
        }
        /* 네번째 */
        #catImg{
            display: flex;
            width: 1200px;
            height: 550px;
        }
        
        #tori1{
            width: 93%;
            height: 55%;
            margin: 10px 0px 0px 20px;
        }
        #tori2{
            width: 100%;
            height: 40%;
            margin: 10px 0px 0px 20px;
            background-color: rgb(0, 0, 0);
        }
        #tori3{
            width: 84%;
            height: 80%;
            margin: 40px 0px 0px 50px;
        }
        #tori4{
            width: 90%;
            height: 80%;
            margin: 40px 0px 0px 30px;
        }
        div[id^="tori"]>img{
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        /* 다섯번째 */
        #img1{
            position: absolute;
            width: 220px;
            height: 350px;
            background-color: red;
            margin-top: 50px;
        }
        #img2{
            position: absolute;
            width: 460px;
            height: 250px;
            background-color: green;
            z-index: 1;
            margin-top:50px;
            left: 250px;
        }
        #img3{
            position: absolute;
            width: 400px;
            height: 290px;
            background-color: darkorchid;
            z-index: 1;
            margin-top: 30px;
            left: 750px;
        }
        #img4{
            position: absolute;
            width: 330px;
            height: 200px;
            top: 340px;
            left: 100px;
            background-color: blue;
        }
        #img5{
            position: absolute;
            width: 460px;
            height: 300px;
            background-color: darkblue;
            top: 240px;
            left: 450px;
        }   
        #img6{
            position: absolute;
            width: 300px;
            height: 220px;
            background-color: mediumturquoise;
            left: 920px;
            top: 305px;
            z-index: 2;
        }
        div[id^="img"]>img{
            width: 100%;
            height: 100%;
            object-fit: fit;
        }
        /* 여섯번째 */
        #introducePage6{
            width: 1200px;
            height :550px;
            position: relative;
            display: flex;
        }
        #keroro{
            position: absolute;
            width: 680px;
            height: 350px;
            background-color: lightgrey;
            top: 150px;
            left: 40px;
        }
        #siro{
            position: absolute;
            width: 400px;
            height: 420px;
            top: 80px;
            left: 750px;
            background-color: darkturquoise;
        }
        #introducePage6 img{
            width: 100%;
            height: 100%;
            object-fit: fill;
        }
    </style>
</head>

                            </tr>
                            <tr style="line-height: 50px;">
                                <td class="under1">전공</td>
                                <td class="under2"><span style="margin-left: 10px;">컴퓨터공학과(올해 졸업)</span></td>
                            </tr>

                                    <li>만화 / 드라마 보기</li>
                                </ul></td>
                            </tr>
                        </table>
                    </div>
                </div>
                <div id="profile_img">
                <img src="img/pororo.jpg" alt="">
                </div>
            </div>

        </div>
